<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --amber: #F2A03D;   /* Claude */
    --green: #3DB868;   /* Codex */
    --bg: #1e1e1e;
    --panel: #2a2a2c;
    --text: #f5f5f7;
    --secondary: #9a9a9e;
    --hairline: rgba(255,255,255,0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    background: transparent;
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    display: flex; gap: 28px; align-items: flex-start;
    padding: 48px;
  }

  /* The menu bar strip */
  .menubar {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .strip {
    background: rgba(40,40,42,0.92);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 5px 12px;
    display: flex; align-items: center; gap: 7px;
    color: var(--text); font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .strip .flame { color: var(--amber); font-size: 13px; }
  .caption { color: var(--secondary); font-size: 12px; }

  /* The popover */
  .popover {
    width: 300px;
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
  }
  .row { display: flex; align-items: flex-start; justify-content: space-between; }
  .hero { font-size: 30px; font-weight: 600; letter-spacing: -0.5px; }
  .hero-sub { display: flex; gap: 8px; align-items: center; margin-top: 2px; }
  .muted { color: var(--secondary); font-size: 12px; }
  .trend { color: #ff5a52; font-size: 11px; display: flex; align-items: center; gap: 2px; }
  .icons { display: flex; flex-direction: column; gap: 8px; align-items: center; color: var(--secondary); }
  .icons div { font-size: 14px; }

  .budget { margin-top: 12px; }
  .bar-track { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.14); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--green); }
  .budget .lbl { font-size: 11px; color: var(--secondary); margin-top: 3px; }

  .divider { height: 1px; background: var(--hairline); margin: 12px 0; }

  .stats { display: flex; gap: 10px; }
  .stat { flex: 1; }
  .stat .k { font-size: 11px; color: var(--secondary); }
  .stat .v { font-size: 13px; font-weight: 500; margin-top: 1px; }

  .spark-cap { font-size: 11px; color: var(--secondary); margin: 12px 0 5px; }
  .spark { display: flex; align-items: flex-end; gap: 3px; height: 44px; }
  .spark .b { width: 14px; border-radius: 2px; background: #5a8dd6; }
  .spark .b.hot { background: var(--amber); }
  .spark .b.zero { opacity: 0.25; }

  .section-h { font-size: 10px; font-weight: 600; color: var(--secondary); letter-spacing: 0.5px; margin: 14px 0 7px; }
  .brow { display: flex; align-items: center; gap: 7px; margin: 6px 0; font-size: 12px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .brow .name { flex: none; }
  .brow .prop { flex: 1; margin: 0 4px; }
  .prop-track { height: 4px; border-radius: 2px; }
  .prop-fill { height: 4px; border-radius: 2px; }
  .brow .tok { color: var(--secondary); font-size: 11px; width: 42px; text-align: right; }
  .brow .cost { width: 52px; text-align: right; font-variant-numeric: tabular-nums; }
  .cache { color: #4cd07d; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
  <!-- Menu bar -->
  <div class="menubar">
    <div class="strip"><span class="flame">&#x1F525;</span><span>$4.21</span></div>
    <div class="caption">in your menu bar</div>
  </div>

  <!-- Popover -->
  <div class="popover">
    <div class="row">
      <div>
        <div class="hero">$4.21</div>
        <div class="hero-sub">
          <span class="muted">today</span>
          <span class="trend">&#x2197; 12% vs last week</span>
        </div>
      </div>
      <div class="icons"><div>&#9881;</div><div>&#8635;</div></div>
    </div>

    <div class="budget">
      <div class="bar-track"><div class="bar-fill" style="width:42%"></div></div>
      <div class="lbl">42% of $10.00</div>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat"><div class="k">Week</div><div class="v">$28.90</div></div>
      <div class="stat"><div class="k">Month</div><div class="v">$112.40</div></div>
      <div class="stat"><div class="k">All-time</div><div class="v">$7,468</div></div>
    </div>
    <div class="muted" style="margin-top:8px;">avg $4.13/day &middot; pace ~$9.80 today</div>

    <div class="spark-cap">last 14 days</div>
    <div class="spark">
      <div class="b zero" style="height:6px"></div>
      <div class="b" style="height:14px"></div>
      <div class="b" style="height:22px"></div>
      <div class="b" style="height:12px"></div>
      <div class="b" style="height:30px"></div>
      <div class="b" style="height:18px"></div>
      <div class="b" style="height:9px"></div>
      <div class="b" style="height:25px"></div>
      <div class="b" style="height:38px"></div>
      <div class="b" style="height:20px"></div>
      <div class="b" style="height:33px"></div>
      <div class="b hot" style="height:44px"></div>
      <div class="b" style="height:16px"></div>
      <div class="b" style="height:11px"></div>
    </div>

    <div class="section-h">BY TOOL</div>
    <div class="brow">
      <span class="dot" style="background:var(--amber)"></span>
      <span class="name">Claude</span>
      <span class="prop"><div class="prop-track" style="background:rgba(242,160,61,0.15)"><div class="prop-fill" style="width:75%;background:var(--amber)"></div></div></span>
      <span class="tok">1.2M</span><span class="cost">$3.10</span>
    </div>
    <div class="brow">
      <span class="dot" style="background:var(--green)"></span>
      <span class="name">Codex</span>
      <span class="prop"><div class="prop-track" style="background:rgba(61,184,104,0.15)"><div class="prop-fill" style="width:28%;background:var(--green)"></div></div></span>
      <span class="tok">340K</span><span class="cost">$1.11</span>
    </div>

    <div class="section-h">BY MODEL</div>
    <div class="brow">
      <span class="dot" style="background:var(--amber)"></span>
      <span class="name">claude-opus-4-8</span>
      <span class="prop"><div class="prop-track" style="background:rgba(242,160,61,0.15)"><div class="prop-fill" style="width:90%;background:var(--amber)"></div></div></span>
      <span class="tok">900K</span><span class="cost">$2.80</span>
    </div>
    <div class="brow">
      <span class="dot" style="background:var(--green)"></span>
      <span class="name">gpt-5</span>
      <span class="prop"><div class="prop-track" style="background:rgba(61,184,104,0.15)"><div class="prop-fill" style="width:36%;background:var(--green)"></div></div></span>
      <span class="tok">340K</span><span class="cost">$1.11</span>
    </div>

    <div class="cache">&#8776; $12.40 saved via cache</div>
  </div>
</body>
</html>
